<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADNMotor — Acceso</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0d11;
      --surface:  #13161c;
      --border:   #1e2330;
      --accent:   #e63946;
      --accent2:  #c1121f;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 10px 24px;
      border-radius: 8px;
      text-transform: uppercase;
    }

    .logo-badge span {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 2px;
      opacity: 0.85;
      display: block;
      margin-top: 2px;
    }

    .logo-icon {
      font-size: 24px;
    }

    h2 {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 12px 16px;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--muted);
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover {
      background: var(--accent2);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .error-msg {
      background: rgba(230, 57, 70, 0.12);
      border: 1px solid rgba(230, 57, 70, 0.3);
      border-radius: 8px;
      color: #ff6b75;
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 20px;
      text-align: center;
    }

    .footer-text {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 28px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }
  </style>
</head>
<body>
  <div class="login-card">

    <div class="logo">
      <div class="logo-badge">
        <span class="logo-icon">⚡</span>
        ADNMotor
      </div>
    </div>

    <h2>Panel de Control — Acceso restringido</h2>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="admin"
          autocomplete="username"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-login">Entrar</button>
    </form>

    <hr class="divider" />

    <p class="footer-text">Woorkia Consulting · Sistema automatizado ADNMotor</p>
  </div>
</body>
</html>
